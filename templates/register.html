<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Library System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">LIBRARY SYSTEM</h1>
      <p class="auth-subtitle">Create your account</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">
            {% for message in messages %}<p>{{ message }}</p>{% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
        <label>Password</label>
        <input type="password" name="password" required>
        <label>Librarian Signup Code <span class="optional">(optional — leave blank if you're a member)</span></label>
        <input type="text" name="signup_code" placeholder="Only librarians need this">
        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>
